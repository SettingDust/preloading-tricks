pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Newer Cloche 0.18.11-dust.17 APIs reject a direct baseline syntax copy.
      likelihood: medium
      impact: high
      mitigation: Preserve current validated plugin imports/helpers where required, then translate only topology and packaging semantics from the UTF-16 baseline.
    - scenario: Restored final jar accidentally uses container variants instead of flattened target include jars.
      likelihood: medium
      impact: high
      mitigation: Validate shadow jar task inputs reference fabric, forgeService, neoforgeModlauncher, and neoforgeFancyModLoader includeJar tasks directly.
    - scenario: Service targets pull game-side source sets, reintroducing runtime-layer leakage.
      likelihood: medium
      impact: medium
      mitigation: Keep forgeService/neoforge service-style targets dependent only on common/common forgelike/modlauncher/neoforge helper targets and never on game targets.
  assumptions:
    - Primary edit is build.gradle.kts only; settings.gradle.kts and gradle.properties remain unchanged unless Gradle validation identifies a strict requirement.
    - plans/20260510-build-script-regression-restore/artifacts/build.gradle.baseline-4b4258ce.kts is the source of truth for topology.
implementation_specification:
  code_structure: |
    Modify build.gradle.kts in place. Retain plugin/version syntax and helper APIs that are required by the currently pinned Cloche/Shadow plugins, but restore the baseline target graph and final flattened artifact assembly.
  affected_areas:
    - build.gradle.kts Cloche common target declarations
    - build.gradle.kts Fabric/Forge/NeoForge target declarations
    - build.gradle.kts version runtime targets
    - build.gradle.kts final shadow jar publication artifact
  component_details:
    - component: Common target topology
      responsibility: Provide common:common, common:forgelike, common:modlauncher, and common:neoforge source-backed targets.
      interfaces:
        - cloche.common target declarations
        - dependsOn relationships consumed by loader targets
      dependencies: []
      integration_points:
        - src/common/** source roots
    - component: Loader target topology
      responsibility: Restore Fabric single target, Forge service target, NeoForge modlauncher target, and NeoForge fancy-mod-loader target using explicit loaderVersion where baseline requires it.
      interfaces:
        - fabric target declaration
        - forge target declaration
        - neoforge target declarations
      dependencies:
        - component: Common target topology
          relationship: Loader targets depend on common helper targets.
      integration_points:
        - src/fabric/main
        - src/forge/service/main
        - src/neoforge/modlauncher/main
        - src/neoforge/fancy-mod-loader/main
    - component: Version runtime targets
      responsibility: Restore version targets to depend on restored loader/service targets, not container project indirection.
      interfaces:
        - modRuntimeOnly(target(...))
        - legacyClasspath(target(...))
      dependencies:
        - component: Loader target topology
          relationship: Runtime-only version targets consume restored loader targets.
      integration_points:
        - version:fabric:20.1
        - version:fabric:21.1
        - version:fabric:26.1
        - version:forge:20.1
        - version:neoforge:21.1
        - version:neoforge:21.10
        - version:neoforge:26.1
    - component: Flattened artifact assembly
      responsibility: Build the final no-classifier jar by unzipping include jars for fabric, forgeService, neoforgeModlauncher, and neoforgeFancyModLoader directly.
      interfaces:
        - ShadowJar shadowContainersJar
        - final jar finalizedBy shadowContainersJar
      dependencies:
        - component: Loader target topology
          relationship: Consumes target include jar outputs.
      integration_points:
        - Gradle build task
        - Maven publication metadata generation
