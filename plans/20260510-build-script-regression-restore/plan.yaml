  Restore the baseline Cloche target graph in build.gradle.kts: common helper targets, loader-version-driven target declarations, no game target in service layer, separate NeoForge modlauncher/fancy-mod-loader targets, and a flattened final artifact assembled directly from target include jars rather than the newer container/include indirection.
